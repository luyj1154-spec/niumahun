<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牛马魂打分器 🐄</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #FF6B35;
    --orange-light: #FF8C42;
    --orange-pale: #FFF0E8;
    --dark: #1A1206;
    --mid: #5C3A1E;
    --cream: #FFF8F0;
    --green: #52C41A;
    --yellow: #FAAD14;
    --red: #FF4D4F;
    --radius: 20px;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans SC', -apple-system, sans-serif;
    background: var(--cream);
    min-height: 100vh;
    color: var(--dark);
  }

  /* ═══ 顶部 Banner ═══ */
  .banner {
    background: linear-gradient(135deg, #FF6B35 0%, #FF4500 50%, #CC3300 100%);
    padding: 48px 24px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(255,255,255,0.03) 20px,
      rgba(255,255,255,0.03) 40px
    );
  }
  .banner-cow {
    font-size: 72px;
    display: block;
    animation: headbang 0.8s ease-in-out infinite alternate;
    position: relative;
    z-index: 1;
  }
  @keyframes headbang {
    from { transform: rotate(-8deg) translateY(0); }
    to   { transform: rotate(8deg) translateY(-6px); }
  }
  .banner-title {
    font-size: clamp(28px, 7vw, 48px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 4px;
    position: relative;
    z-index: 1;
    margin-top: 8px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .banner-sub {
    font-size: 15px;
    color: rgba(255,255,255,0.8);
    margin-top: 6px;
    position: relative;
    z-index: 1;
    letter-spacing: 1px;
  }

  /* ═══ 主布局 ═══ */
  .main {
    max-width: 520px;
    margin: 0 auto;
    padding: 28px 16px 60px;
  }

  /* ═══ 卡片 ═══ */
  .card {
    background: #fff;
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: 0 4px 24px rgba(255,107,53,0.1);
    border: 1.5px solid rgba(255,107,53,0.1);
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--mid);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title span { font-size: 20px; }

  /* ═══ 表单元素 ═══ */
  .form-row {
    margin-bottom: 22px;
  }
  .form-label {
    font-size: 14px;
    font-weight: 700;
    color: #444;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .form-label .icon { font-size: 18px; }
  .form-hint {
    font-size: 12px;
    color: #999;
    margin-left: auto;
    font-weight: 400;
  }

  /* 步进器 */
  .stepper {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .stepper-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--orange);
    color: #fff;
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.1s, background 0.2s;
    user-select: none;
  }
  .stepper-btn:active { transform: scale(0.9); }
  .stepper-btn.minus { background: #f0e8e0; color: var(--orange); }
  .stepper-val {
    font-size: 32px;
    font-weight: 900;
    color: var(--orange);
    min-width: 60px;
    text-align: center;
    line-height: 1;
  }
  .stepper-unit {
    font-size: 13px;
    color: #999;
    margin-left: -4px;
  }

  /* 滑块 */
  .slider-wrap {
    margin-top: 10px;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 99px;
    background: linear-gradient(to right, var(--orange) 0%, var(--orange) var(--val, 0%), #f0e0d0 var(--val, 0%), #f0e0d0 100%);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--orange);
    box-shadow: 0 2px 6px rgba(255,107,53,0.4);
    cursor: grab;
    transition: transform 0.1s;
  }
  input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); }

  /* 心情选择 */
  .mood-row {
    display: flex;
    gap: 8px;
  }
  .mood-btn {
    flex: 1;
    border: 2px solid #f0e0d0;
    background: #fff;
    border-radius: 14px;
    padding: 10px 4px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transition: all 0.2s;
  }
  .mood-btn:active { transform: scale(0.94); }
  .mood-btn.active {
    border-color: var(--orange);
    background: var(--orange-pale);
  }
  .mood-btn .mood-emoji { font-size: 26px; }
  .mood-btn .mood-label { font-size: 11px; color: #999; font-weight: 700; }
  .mood-btn.active .mood-label { color: var(--orange); }

  /* 文本框 */
  textarea {
    width: 100%;
    min-height: 80px;
    border: 1.5px solid #f0e0d0;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 14px;
    font-family: inherit;
    color: #333;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  textarea:focus { border-color: var(--orange); }
  .char-count { text-align: right; font-size: 11px; color: #ccc; margin-top: 4px; }

  /* ═══ 实时预览分数 ═══ */
  .score-preview {
    text-align: center;
    padding: 20px 28px 24px;
  }
  .score-preview-label { font-size: 13px; color: #999; margin-bottom: 4px; }
  .score-big {
    font-size: 88px;
    font-weight: 900;
    line-height: 1;
    transition: color 0.4s;
  }
  .score-title-text {
    font-size: 16px;
    font-weight: 700;
    color: #444;
    margin-top: 8px;
  }
  .score-bar-wrap {
    height: 10px;
    background: #f5ede6;
    border-radius: 99px;
    overflow: hidden;
    margin-top: 16px;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.5s ease, background 0.5s;
  }

  /* ═══ 提交按钮 ═══ */
  .submit-btn {
    width: 100%;
    background: linear-gradient(135deg, #FF6B35, #FF4500);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 18px;
    font-size: 18px;
    font-weight: 900;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 8px 24px rgba(255,107,53,0.35);
    transition: transform 0.1s, box-shadow 0.2s;
    margin-bottom: 20px;
  }
  .submit-btn:hover { box-shadow: 0 12px 32px rgba(255,107,53,0.45); }
  .submit-btn:active { transform: scale(0.97); }

  /* ═══ 结果区 ═══ */
  #result-section { display: none; }
  #result-section.show { display: block; }

  /* ═══ 分享卡片（用于截图） ═══ */
  .share-card {
    width: 100%;
    border-radius: 24px;
    overflow: hidden;
    position: relative;
    font-family: 'Noto Sans SC', sans-serif;
  }

  /* 卡片背景 - 根据分数动态变化 */
  .share-card-inner {
    padding: 0;
    position: relative;
  }

  /* 顶部色块 */
  .sc-header {
    padding: 32px 28px 24px;
    position: relative;
    overflow: hidden;
  }
  .sc-header::after {
    content: '';
    position: absolute;
    bottom: -30px;
    right: -30px;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
  }
  .sc-header::before {
    content: '';
    position: absolute;
    top: -20px;
    left: -20px;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }

  .sc-badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    border: 1.5px solid rgba(255,255,255,0.4);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 14px;
    border-radius: 99px;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .sc-date {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    margin-bottom: 16px;
  }

  .sc-score-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .sc-score-num {
    font-size: 80px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
    text-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .sc-score-suffix {
    font-size: 24px;
    font-weight: 700;
    color: rgba(255,255,255,0.8);
  }

  .sc-level-badge {
    margin-top: 10px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(4px);
    border-radius: 99px;
    padding: 6px 16px;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }

  /* 卡片主体内容 */
  .sc-body {
    background: #fff;
    padding: 24px 28px 20px;
  }

  .sc-title {
    font-size: 18px;
    font-weight: 900;
    color: #1a1206;
    line-height: 1.4;
    margin-bottom: 16px;
  }

  /* 扣分明细 */
  .sc-detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .sc-detail-cell {
    background: #faf6f2;
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sc-detail-icon { font-size: 20px; flex-shrink: 0; }
  .sc-detail-info {}
  .sc-detail-label { font-size: 11px; color: #999; font-weight: 700; }
  .sc-detail-val { font-size: 16px; font-weight: 900; color: #333; }

  /* 牛马文案 */
  .sc-quote {
    background: linear-gradient(135deg, #fff8f4, #fff0e8);
    border-left: 4px solid var(--orange);
    border-radius: 0 12px 12px 0;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .sc-quote-main { font-size: 15px; font-weight: 700; color: #333; line-height: 1.6; }
  .sc-quote-sub { font-size: 13px; color: #888; margin-top: 6px; line-height: 1.5; }

  /* 鼓励语 */
  .sc-encourage {
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    color: var(--orange);
    padding: 12px;
    background: var(--orange-pale);
    border-radius: 12px;
    margin-bottom: 16px;
  }

  /* 动态牛马SVG区域 */
  .sc-cow-area {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 8px 0;
    margin-bottom: 12px;
  }

  /* 底部水印 */
  .sc-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 14px;
    border-top: 1.5px dashed #f0e0d0;
  }
  .sc-footer-brand { font-size: 13px; font-weight: 900; color: var(--orange); }
  .sc-footer-tip { font-size: 11px; color: #ccc; }

  /* ═══ 操作按钮 ═══ */
  .action-row {
    display: flex;
    gap: 12px;
    margin-top: 16px;
  }
  .dl-btn {
    flex: 1;
    border: none;
    border-radius: 50px;
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .dl-btn:active { transform: scale(0.96); }
  .dl-btn-primary {
    background: linear-gradient(135deg, #FF6B35, #FF4500);
    color: #fff;
    box-shadow: 0 6px 20px rgba(255,107,53,0.3);
  }
  .dl-btn-secondary {
    background: var(--orange-pale);
    color: var(--orange);
    border: 2px solid rgba(255,107,53,0.2);
  }

  /* ═══ 扣分明细说明 ═══ */
  .deduct-list { margin-top: 4px; }
  .deduct-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #f5ede6;
  }
  .deduct-item:last-child { border-bottom: none; }
  .deduct-left { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #555; }
  .deduct-icon-sm { font-size: 18px; }
  .deduct-right { font-size: 15px; font-weight: 900; }
  .deduct-neg { color: var(--red); }
  .deduct-pos { color: var(--green); }

  /* ═══ 提示动画 ═══ */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(0,0,0,0.82);
    color: #fff;
    padding: 14px 28px;
    border-radius: 50px;
    font-size: 15px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    z-index: 9999;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* 加载蒙层 */
  .loading-mask {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 8888;
  }
  .loading-mask.show { display: flex; }
  .loading-cow { font-size: 60px; animation: headbang 0.6s ease-in-out infinite alternate; }
  .loading-text { font-size: 16px; font-weight: 700; color: var(--orange); }

  /* 响应式 */
  @media (max-width: 380px) {
    .sc-score-num { font-size: 64px; }
    .mood-btn .mood-emoji { font-size: 22px; }
    .sc-detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- 顶部 -->
<div class="banner">
  <span class="banner-cow">🐄</span>
  <div class="banner-title">牛马魂打分器</div>
  <div class="banner-sub">今天你惨不惨？诚实作答，科学测评</div>
</div>

<div class="main">

  <!-- ═══ 打卡表单 ═══ -->
  <div class="card">
    <div class="card-title"><span>⏰</span> 今日加班时长</div>
    <div class="form-row">
      <div class="stepper">
        <button class="stepper-btn minus" onclick="change('overtime', -0.5)">－</button>
        <div class="stepper-val" id="overtime-val">0</div>
        <span class="stepper-unit">小时</span>
        <button class="stepper-btn" onclick="change('overtime', 0.5)">＋</button>
      </div>
      <div class="slider-wrap">
        <input type="range" min="0" max="12" step="0.5" value="0" id="overtime-slider"
          oninput="sliderChange('overtime', this)">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span>🗣️</span> 被PUA次数</div>
    <div class="stepper">
      <button class="stepper-btn minus" onclick="change('pua', -1)">－</button>
      <div class="stepper-val" id="pua-val">0</div>
      <span class="stepper-unit">次</span>
      <button class="stepper-btn" onclick="change('pua', 1)">＋</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span>😤</span> 挨批评次数</div>
    <div class="stepper">
      <button class="stepper-btn minus" onclick="change('criticized', -1)">－</button>
      <div class="stepper-val" id="criticized-val">0</div>
      <span class="stepper-unit">次</span>
      <button class="stepper-btn" onclick="change('criticized', 1)">＋</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span>💭</span> 今日心情</div>
    <div class="mood-row">
      <button class="mood-btn" onclick="setMood(1, this)">
        <span class="mood-emoji">😭</span>
        <span class="mood-label">崩溃</span>
      </button>
      <button class="mood-btn" onclick="setMood(2, this)">
        <span class="mood-emoji">😔</span>
        <span class="mood-label">难过</span>
      </button>
      <button class="mood-btn active" onclick="setMood(3, this)">
        <span class="mood-emoji">😐</span>
        <span class="mood-label">一般</span>
      </button>
      <button class="mood-btn" onclick="setMood(4, this)">
        <span class="mood-emoji">🙂</span>
        <span class="mood-label">不错</span>
      </button>
      <button class="mood-btn" onclick="setMood(5, this)">
        <span class="mood-emoji">😁</span>
        <span class="mood-label">开心</span>
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span>📝</span> 今天干了啥 <span style="font-size:12px;color:#bbb;font-weight:400;margin-left:auto">可选</span></div>
    <textarea id="work-note" maxlength="80" placeholder="简单说说今天发生了什么，或者随便发泄一下也行~"
      oninput="document.getElementById('char-count').textContent=this.value.length"></textarea>
    <div class="char-count"><span id="char-count">0</span>/80</div>
  </div>

  <!-- 实时预览 -->
  <div class="card score-preview">
    <div class="score-preview-label">当前牛马魂预估</div>
    <div class="score-big" id="preview-score">100</div>
    <div class="score-title-text" id="preview-title">神清气爽的小牛犊 🐄✨</div>
    <div class="score-bar-wrap">
      <div class="score-bar-fill" id="preview-bar" style="width:100%;background:#52C41A"></div>
    </div>
  </div>

  <button class="submit-btn" onclick="submitScore()">🐄 生成今日牛马报告！</button>

  <!-- ═══ 结果区 ═══ -->
  <div id="result-section">

    <!-- 操作按钮 -->
    <div class="action-row">
      <button class="dl-btn dl-btn-primary" onclick="downloadCard()">📸 下载分享图片</button>
      <button class="dl-btn dl-btn-secondary" onclick="resetForm()">↺ 重新打卡</button>
    </div>

    <!-- 扣分明细卡 -->
    <div class="card" style="margin-top:20px">
      <div class="card-title"><span>📊</span> 今日扣分明细</div>
      <div class="deduct-list" id="deduct-list"></div>
    </div>

    <!-- 分享卡片 -->
    <div style="margin-top:20px">
      <div class="card-title" style="padding:0 0 12px;font-size:14px;color:#999">👇 下方即为生成的分享图片</div>
      <div id="share-card-wrap">
        <div class="share-card" id="share-card">
          <div class="share-card-inner">

            <!-- 顶部色块 -->
            <div class="sc-header" id="sc-header">
              <div class="sc-badge">🐄 牛马魂打分器</div>
              <div class="sc-date" id="sc-date"></div>
              <div class="sc-score-row">
                <div class="sc-score-num" id="sc-score-num">88</div>
                <div class="sc-score-suffix">分</div>
              </div>
              <div class="sc-level-badge" id="sc-level-badge">😎 意气风发的职场牛</div>
            </div>

            <!-- 白色主体 -->
            <div class="sc-body">

              <!-- 牛马SVG动画区 -->
              <div class="sc-cow-area">
                <svg id="cow-svg" width="200" height="160" viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg"></svg>
              </div>

              <!-- 称号 -->
              <div class="sc-title" id="sc-title">意气风发的职场牛</div>

              <!-- 数据格子 -->
              <div class="sc-detail-grid" id="sc-detail-grid"></div>

              <!-- 文案 -->
              <div class="sc-quote">
                <div class="sc-quote-main" id="sc-quote-main"></div>
                <div class="sc-quote-sub" id="sc-quote-sub"></div>
              </div>

              <!-- 鼓励 -->
              <div class="sc-encourage" id="sc-encourage"></div>

              <!-- 底部 -->
              <div class="sc-footer">
                <div class="sc-footer-brand">🐄 牛马魂打分器</div>
                <div class="sc-footer-tip">今天也要撑住哦</div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Loading -->
<div class="loading-mask" id="loading-mask">
  <div class="loading-cow">🐄</div>
  <div class="loading-text">正在生成图片，牛马努力工作中…</div>
</div>

<script>
// ═══════════════════════════════
// 数据状态
// ═══════════════════════════════
const state = {
  overtime: 0,
  pua: 0,
  criticized: 0,
  mood: 3,
};

// ═══ 文案库 ═══
const textBank = {
  S: {
    main: ['哇哦！今天的你简直是职场界的传说！', '今天没加班没被PUA？你是领导心头宝还是摸鱼达人？', '全场最佳！今天的牛马魂满格在线！'],
    sub: ['继续保持，你离人生赢家只差一步 ✨', '享受今天的轻松，明天的加班在路上呢 😏', '快乐的牛马今天会飞 🐄💨'],
    encourage: '状态满级！继续燃烧你的职场魂！🔥'
  },
  A: {
    main: ['今天状态不错哦！比昨天的自己强！', '小有成就感的一天，虽然还是牛马，但是快乐的牛马！', '今天的你，略显从容，让人嫉妒！'],
    sub: ['加点油，A+就在前方！🌟', '这种状态值得奖励自己一顿好饭 🍜', '你的牛马魂今天还在线，可喜可贺 🎉'],
    encourage: '继续加油！你是最可爱的打工牛！🐄'
  },
  B: {
    main: ['嗯……今天就这样吧，平平无奇的一天。', '不高不低，牛马界的中流砥柱，沉默的大多数。', '今天的你跟昨天没什么区别——都在撑着。'],
    sub: ['不用担心，60分也是过关！🎯', '普通即是幸福，你今天很幸福（也许）', '明天说不定更好……或者更差，谁知道呢 🤷'],
    encourage: '平凡的你，撑起了不平凡的公司！感谢付出！'
  },
  C: {
    main: ['今天……辛苦了。真的，字面意义上的辛苦。', '牛马魂已经开始动摇，但你还撑着，好样的。', '感觉今天被榨干了？别担心，明天重置！'],
    sub: ['快去补充能量，你的电量已不足30% 🔋', '今晚好好睡一觉，明天还要继续上班呢 😴', '你今天的坚持，被这个打分器永久记录了'],
    encourage: '撑过今天就是英雄！给自己鼓个掌 👏'
  },
  D: {
    main: ['哎……我都替你累了。', '今天的你，被生活温柔地摩擦了一下（比较用力的那种）。', '牛马魂剩余不多，请及时充值休息！'],
    sub: ['今晚一定要早点睡！这是命令！😤', '你需要立刻补充能量，否则明天可能开不了机', '你今天的遭遇，值得写进打工人辛酸史 📖'],
    encourage: '黑暗是黎明前的，你撑过来了！明天会好的！🌅'
  },
  F: {
    main: ['……朋友，你还好吗？', '牛马魂评分系统对今天的你，感到由衷的心疼。', '这一天是怎么过来的？你是英雄。'],
    sub: ['今天的你，已经超越了大部分人能承受的极限 🥹', '世界欠你一个好好休息的周末 🛋️', '能撑到今天，已经赢了99%的打工人'],
    encourage: '能下班回家，你就是今天最勇敢的牛！🐄❤️'
  }
};

// ═══ 计算函数 ═══
function calcScore() {
  let s = 100;
  const { overtime, pua, criticized, mood } = state;

  // 加班
  const oRate = overtime <= 2 ? 5 : overtime <= 4 ? 6 : overtime <= 6 ? 7 : 8;
  s -= Math.min(overtime * oRate, 50);

  // PUA
  const pRate = pua <= 1 ? 8 : pua <= 3 ? 10 : 12;
  s -= Math.min(pua * pRate, 40);

  // 批评
  const cRate = criticized <= 1 ? 10 : criticized <= 2 ? 12 : 15;
  s -= Math.min(criticized * cRate, 45);

  // 心情
  s += (mood - 3) * 3;

  return Math.max(0, Math.min(100, Math.round(s)));
}

function getLevel(s) {
  if (s >= 90) return 'S';
  if (s >= 80) return 'A';
  if (s >= 60) return 'B';
  if (s >= 40) return 'C';
  if (s >= 20) return 'D';
  return 'F';
}

function getTitle(s) {
  if (s >= 90) return '神清气爽的小牛犊 🐄✨';
  if (s >= 80) return '意气风发的职场牛 🐂😎';
  if (s >= 60) return '勉强撑着的普通牛 🐮😐';
  if (s >= 40) return '摇摇欲坠的老黄牛 🐃😮‍💨';
  if (s >= 20) return '精疲力竭的残血牛 🐄😵';
  return '已经原地升天的牛仙 👼🐄';
}

function scoreColor(s) {
  if (s >= 80) return '#52C41A';
  if (s >= 60) return '#FAAD14';
  if (s >= 40) return '#FF7A45';
  return '#FF4D4F';
}

function headerGradient(s) {
  if (s >= 80) return 'linear-gradient(135deg, #52C41A, #237804)';
  if (s >= 60) return 'linear-gradient(135deg, #FAAD14, #D48806)';
  if (s >= 40) return 'linear-gradient(135deg, #FF7A45, #D4380D)';
  return 'linear-gradient(135deg, #FF4D4F, #A8071A)';
}

function getText(level) {
  const b = textBank[level];
  const ri = n => Math.floor(Math.random() * n);
  return {
    main: b.main[ri(b.main.length)],
    sub: b.sub[ri(b.sub.length)],
    encourage: b.encourage,
  };
}

function getDeductions() {
  const { overtime, pua, criticized, mood } = state;
  const items = [];
  if (overtime > 0) {
    const r = overtime <= 2 ? 5 : overtime <= 4 ? 6 : overtime <= 6 ? 7 : 8;
    items.push({ icon: '⏰', label: `加班 ${overtime} 小时`, deduct: Math.min(overtime * r, 50) });
  }
  if (pua > 0) {
    const r = pua <= 1 ? 8 : pua <= 3 ? 10 : 12;
    items.push({ icon: '🗣️', label: `PUA ${pua} 次`, deduct: Math.min(pua * r, 40) });
  }
  if (criticized > 0) {
    const r = criticized <= 1 ? 10 : criticized <= 2 ? 12 : 15;
    items.push({ icon: '😤', label: `批评 ${criticized} 次`, deduct: Math.min(criticized * r, 45) });
  }
  const moodBonus = (mood - 3) * 3;
  if (moodBonus !== 0) {
    items.push({
      icon: mood >= 4 ? '😊' : '😢',
      label: moodBonus > 0 ? '心情加成' : '心情惩罚',
      deduct: -moodBonus,
      isBonus: moodBonus > 0
    });
  }
  return items;
}

// ═══ 状态更新 ═══
function change(key, delta) {
  const min = 0;
  const max = key === 'overtime' ? 12 : 20;
  state[key] = Math.max(min, Math.min(max, parseFloat((state[key] + delta).toFixed(1))));
  const val = key === 'overtime' ? state[key] : state[key];
  document.getElementById(`${key}-val`).textContent = val;
  if (key === 'overtime') {
    const slider = document.getElementById('overtime-slider');
    slider.value = state.overtime;
    updateSliderBg(slider);
  }
  updatePreview();
}

function sliderChange(key, el) {
  state[key] = parseFloat(el.value);
  document.getElementById(`${key}-val`).textContent = state[key];
  updateSliderBg(el);
  updatePreview();
}

function updateSliderBg(el) {
  const pct = (el.value - el.min) / (el.max - el.min) * 100;
  el.style.setProperty('--val', pct + '%');
}

function setMood(v, btn) {
  state.mood = v;
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updatePreview();
}

function updatePreview() {
  const s = calcScore();
  const color = scoreColor(s);
  document.getElementById('preview-score').textContent = s;
  document.getElementById('preview-score').style.color = color;
  document.getElementById('preview-title').textContent = getTitle(s);
  document.getElementById('preview-bar').style.width = s + '%';
  document.getElementById('preview-bar').style.background = color;
}

// ═══ 绘制SVG牛马 ═══
function drawCowSVG(score) {
  const svg = document.getElementById('cow-svg');

  // 根据分数决定牛马状态参数
  const isHappy = score >= 80;
  const isTired = score < 40;
  const isDying = score < 20;

  // 颜色
  const bodyColor = '#F5E6D0';
  const outlineColor = '#5C3A1E';
  const spotColor = '#3D2010';

  // 身体倾斜（越惨越歪）
  const lean = isDying ? 12 : isTired ? 6 : 0;

  let html = `<g transform="translate(100, 80) rotate(${lean})">`;

  // 阴影
  html += `<ellipse cx="0" cy="72" rx="45" ry="10" fill="${outlineColor}" opacity="0.12"/>`;

  // 腿（4条）
  const legLines = [
    [-28, 32, -32, 70],
    [28, 32, 32, 70],
    [-20, 40, -24, 70],
    [20, 40, 24, 70],
  ];
  legLines.forEach(([x1, y1, x2, y2], i) => {
    const wobble = isTired ? (i % 2 === 0 ? 8 : -8) : 0;
    html += `<line x1="${x1}" y1="${y1}" x2="${x2 + wobble}" y2="${y2}" stroke="${outlineColor}" stroke-width="7" stroke-linecap="round"/>`;
  });

  // 身体
  html += `<ellipse cx="0" cy="22" rx="48" ry="36" fill="${bodyColor}" stroke="${outlineColor}" stroke-width="4"/>`;

  // 花斑
  html += `<ellipse cx="-18" cy="12" rx="14" ry="10" fill="${spotColor}" opacity="0.8"/>`;
  html += `<ellipse cx="16" cy="28" rx="12" ry="9" fill="${spotColor}" opacity="0.8"/>`;

  // 肚皮
  html += `<ellipse cx="0" cy="30" rx="28" ry="18" fill="#FAEBD7"/>`;

  // 尾巴
  const tailY = isTired ? 10 : -5;
  html += `<path d="M46 5 Q62 ${tailY} 55 ${tailY - 18}" fill="none" stroke="${outlineColor}" stroke-width="5" stroke-linecap="round"/>`;
  html += `<circle cx="55" cy="${tailY - 19}" r="7" fill="${spotColor}"/>`;

  // 头部（连接到身体左侧）
  const headX = -55;
  const headY = -22;
  const headTilt = isDying ? -15 : isTired ? -8 : 0;

  html += `<g transform="translate(${headX}, ${headY}) rotate(${headTilt})">`;

  // 头
  html += `<ellipse cx="0" cy="0" rx="28" ry="24" fill="${bodyColor}" stroke="${outlineColor}" stroke-width="4"/>`;

  // 吻部
  html += `<ellipse cx="-20" cy="8" rx="13" ry="10" fill="#F0C8A0" stroke="${outlineColor}" stroke-width="3"/>`;
  html += `<ellipse cx="-24" cy="8" rx="3.5" ry="2.5" fill="#C87050"/>`;
  html += `<ellipse cx="-16" cy="8" rx="3.5" ry="2.5" fill="#C87050"/>`;

  // 耳朵
  html += `<ellipse cx="-6" cy="-22" rx="10" ry="15" fill="${bodyColor}" stroke="${outlineColor}" stroke-width="3"/>`;
  html += `<ellipse cx="10" cy="-22" rx="10" ry="15" fill="${bodyColor}" stroke="${outlineColor}" stroke-width="3"/>`;
  html += `<ellipse cx="-6" cy="-22" rx="5" ry="8" fill="#FFAAAA"/>`;
  html += `<ellipse cx="10" cy="-22" rx="5" ry="8" fill="#FFAAAA"/>`;

  // 角
  html += `<path d="M-10 -18 Q-20 -40 -8 -46" fill="none" stroke="#8B6914" stroke-width="6" stroke-linecap="round"/>`;
  html += `<path d="M10 -18 Q20 -40 8 -46" fill="none" stroke="#8B6914" stroke-width="6" stroke-linecap="round"/>`;

  // 眼睛
  if (isHappy) {
    // 弯弯笑眼
    html += `<path d="M-10 -7 Q-7 -11 -4 -7" fill="none" stroke="${outlineColor}" stroke-width="3" stroke-linecap="round"/>`;
    html += `<path d="M6 -7 Q9 -11 12 -7" fill="none" stroke="${outlineColor}" stroke-width="3" stroke-linecap="round"/>`;
    // 墨镜
    html += `<ellipse cx="-7" cy="-5" rx="9" ry="7" fill="#333" opacity="0.9"/>`;
    html += `<ellipse cx="9" cy="-5" rx="9" ry="7" fill="#333" opacity="0.9"/>`;
    html += `<line x1="-7+9" y1="-5" x2="9-9" y2="-5" stroke="#555" stroke-width="2"/>`;
    html += `<ellipse cx="-9" cy="-7" rx="3" ry="2" fill="white" opacity="0.3"/>`;
    // 光环
    html += `<ellipse cx="0" cy="-50" rx="20" ry="7" fill="none" stroke="#FFD700" stroke-width="4" opacity="0.9"/>`;
  } else if (isDying) {
    // 叉叉眼
    html += `<line x1="-14" y1="-10" x2="-4" y2="0" stroke="${outlineColor}" stroke-width="3" stroke-linecap="round"/>`;
    html += `<line x1="-4" y1="-10" x2="-14" y2="0" stroke="${outlineColor}" stroke-width="3" stroke-linecap="round"/>`;
    html += `<line x1="4" y1="-10" x2="14" y2="0" stroke="${outlineColor}" stroke-width="3" stroke-linecap="round"/>`;
    html += `<line x1="14" y1="-10" x2="4" y2="0" stroke="${outlineColor}" stroke-width="3" stroke-linecap="round"/>`;
  } else if (isTired) {
    // 半闭眼
    html += `<ellipse cx="-7" cy="-5" rx="7" ry="5" fill="${outlineColor}"/>`;
    html += `<ellipse cx="9" cy="-5" rx="7" ry="5" fill="${outlineColor}"/>`;
    html += `<ellipse cx="-7" cy="-8" rx="7" ry="4" fill="${bodyColor}"/>`;
    html += `<ellipse cx="9" cy="-8" rx="7" ry="4" fill="${bodyColor}"/>`;
    html += `<ellipse cx="-5" cy="-7" rx="2" ry="1.5" fill="#fff"/>`;
    html += `<ellipse cx="11" cy="-7" rx="2" ry="1.5" fill="#fff"/>`;
  } else {
    // 正常眼睛
    html += `<ellipse cx="-7" cy="-5" rx="7" ry="6" fill="${outlineColor}"/>`;
    html += `<ellipse cx="9" cy="-5" rx="7" ry="6" fill="${outlineColor}"/>`;
    html += `<ellipse cx="-5" cy="-7" rx="2.5" ry="2" fill="#fff"/>`;
    html += `<ellipse cx="11" cy="-7" rx="2.5" ry="2" fill="#fff"/>`;
  }

  // 嘴巴
  if (isHappy) {
    html += `<path d="M-26 12 Q-20 18 -14 12" fill="none" stroke="${outlineColor}" stroke-width="3" stroke-linecap="round"/>`;
  } else if (isDying) {
    html += `<ellipse cx="-20" cy="12" rx="8" ry="7" fill="${outlineColor}"/>`;
  } else if (isTired) {
    html += `<path d="M-26 14 Q-20 10 -14 14" fill="none" stroke="${outlineColor}" stroke-width="3" stroke-linecap="round"/>`;
  } else {
    html += `<line x1="-26" y1="12" x2="-14" y2="12" stroke="${outlineColor}" stroke-width="3" stroke-linecap="round"/>`;
  }

  html += `</g>`; // end head group

  // 汗滴（低分时）
  if (score < 60) {
    const sweatCount = score < 20 ? 5 : score < 40 ? 3 : 1;
    const positions = [[-30, -45], [35, -30], [-50, -20], [50, -10], [-10, -55]];
    for (let i = 0; i < sweatCount; i++) {
      const [sx, sy] = positions[i];
      html += `<g opacity="0.75">
        <circle cx="${sx}" cy="${sy}" r="${4 + i * 0.5}" fill="#66BBFF"/>
        <polygon points="${sx},-${Math.abs(sy) + 3} ${sx - 3},-${Math.abs(sy) + 10} ${sx + 3},-${Math.abs(sy) + 10}" fill="#66BBFF"/>
      </g>`;
    }
  }

  // 星星（高分时）
  if (isHappy) {
    html += `<text x="60" y="-40" font-size="18" opacity="0.9">✨</text>`;
    html += `<text x="-80" y="-30" font-size="16" opacity="0.8">🎵</text>`;
    html += `<text x="65" y="10" font-size="14" opacity="0.7">⭐</text>`;
  }

  html += `</g>`; // end main group
  svg.innerHTML = html;
}

// ═══ 提交 ═══
function submitScore() {
  const score = calcScore();
  const level = getLevel(score);
  const title = getTitle(score);
  const color = scoreColor(score);
  const gradient = headerGradient(score);
  const texts = getText(level);
  const deductions = getDeductions();
  const now = new Date();
  const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;

  const moodEmojis = { 1:'😭', 2:'😔', 3:'😐', 4:'🙂', 5:'😁' };

  // 更新分享卡片
  document.getElementById('sc-date').textContent = `📅 ${dateStr}`;
  document.getElementById('sc-score-num').textContent = score;
  document.getElementById('sc-level-badge').textContent = title;
  document.getElementById('sc-header').style.background = gradient;
  document.getElementById('sc-title').textContent = title;
  document.getElementById('sc-quote-main').textContent = texts.main;
  document.getElementById('sc-quote-sub').textContent = texts.sub;
  document.getElementById('sc-encourage').textContent = texts.encourage;

  // 数据格子
  const grid = document.getElementById('sc-detail-grid');
  grid.innerHTML = `
    <div class="sc-detail-cell">
      <span class="sc-detail-icon">⏰</span>
      <div class="sc-detail-info">
        <div class="sc-detail-label">加班时长</div>
        <div class="sc-detail-val">${state.overtime}h</div>
      </div>
    </div>
    <div class="sc-detail-cell">
      <span class="sc-detail-icon">🗣️</span>
      <div class="sc-detail-info">
        <div class="sc-detail-label">被PUA</div>
        <div class="sc-detail-val">${state.pua}次</div>
      </div>
    </div>
    <div class="sc-detail-cell">
      <span class="sc-detail-icon">😤</span>
      <div class="sc-detail-info">
        <div class="sc-detail-label">挨批评</div>
        <div class="sc-detail-val">${state.criticized}次</div>
      </div>
    </div>
    <div class="sc-detail-cell">
      <span class="sc-detail-icon">${moodEmojis[state.mood]}</span>
      <div class="sc-detail-info">
        <div class="sc-detail-label">今日心情</div>
        <div class="sc-detail-val">${['','崩溃','难过','一般','不错','开心'][state.mood]}</div>
      </div>
    </div>
  `;

  // 扣分明细
  const deductEl = document.getElementById('deduct-list');
  if (deductions.length === 0) {
    deductEl.innerHTML = '<div style="text-align:center;padding:16px;color:#999;font-size:14px">今天零扣分！牛马魂满格！🎉</div>';
  } else {
    deductEl.innerHTML = deductions.map(d =>
      `<div class="deduct-item">
        <div class="deduct-left"><span class="deduct-icon-sm">${d.icon}</span>${d.label}</div>
        <div class="deduct-right ${d.isBonus ? 'deduct-pos' : 'deduct-neg'}">
          ${d.isBonus ? '+' : '-'}${Math.abs(d.deduct)}分
        </div>
      </div>`
    ).join('');
  }

  // 绘制SVG牛马
  drawCowSVG(score);

  // 显示结果区
  const resultEl = document.getElementById('result-section');
  resultEl.classList.add('show');

  // 滚动到结果
  setTimeout(() => {
    resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

// ═══ 下载图片 ═══
async function downloadCard() {
  const mask = document.getElementById('loading-mask');
  mask.classList.add('show');

  try {
    const card = document.getElementById('share-card');
    const canvas = await html2canvas(card, {
      scale: 2.5,
      useCORS: true,
      backgroundColor: null,
      logging: false,
      allowTaint: true,
    });

    const link = document.createElement('a');
    const now = new Date();
    link.download = `牛马魂报告_${now.getFullYear()}${now.getMonth()+1}${now.getDate()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();

    mask.classList.remove('show');
    showToast('图片已下载到本地 📸');
  } catch (e) {
    mask.classList.remove('show');
    showToast('下载失败，请截图保存');
    console.error(e);
  }
}

// ═══ 重置 ═══
function resetForm() {
  state.overtime = 0;
  state.pua = 0;
  state.criticized = 0;
  state.mood = 3;

  document.getElementById('overtime-val').textContent = '0';
  document.getElementById('pua-val').textContent = '0';
  document.getElementById('criticized-val').textContent = '0';
  document.getElementById('overtime-slider').value = 0;
  updateSliderBg(document.getElementById('overtime-slider'));
  document.getElementById('work-note').value = '';
  document.getElementById('char-count').textContent = '0';

  document.querySelectorAll('.mood-btn').forEach((b, i) => {
    b.classList.toggle('active', i === 2);
  });

  document.getElementById('result-section').classList.remove('show');
  updatePreview();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══ Toast ═══
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ═══ 初始化 ═══
updatePreview();
updateSliderBg(document.getElementById('overtime-slider'));
</script>
</body>
</html>
